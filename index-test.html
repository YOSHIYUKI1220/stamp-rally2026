// ==================== QR SCANNER (jsQR via CDN) ====================
function detectCameraErrorType(e) {
  const name = e?.name || "";
  const msg  = (e?.message || "").toLowerCase();
  if (name === "NotAllowedError"  || msg.includes("permission") || msg.includes("denied"))
    return "denied";
  if (name === "NotFoundError"    || msg.includes("not found") || msg.includes("no device"))
    return "notFound";
  if (name === "NotSupportedError"|| msg.includes("secure")    || msg.includes("https"))
    return "notHttps";
  if (name === "NotReadableError" || msg.includes("in use")    || msg.includes("allocated"))
    return "inUse";
  return "unknown";
}

function useQRScanner(onScan) {
  const videoRef  = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef    = useRef(null);
  const [error,     setError]     = useState(null);   // null | errorType string
  const [active,    setActive]    = useState(false);
  const [permState, setPermState] = useState(null);   // "granted"|"denied"|"prompt"|null

  // 許可状態をポーリングで監視（設定変更後に自動リトライ）
  useEffect(() => {
    if (!navigator.permissions) return;
    let timer;
    navigator.permissions.query({ name: "camera" }).then(status => {
      setPermState(status.state);
      status.onchange = () => {
        setPermState(status.state);
        if (status.state === "granted") { setError(null); }
      };
    }).catch(() => {});
    return () => clearTimeout(timer);
  }, []);

  const stop = useCallback(() => {
    cancelAnimationFrame(rafRef.current);
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
    setActive(false);
  }, []);

  const start = useCallback(async () => {
    setError(null);
    if (!navigator.mediaDevices?.getUserMedia) {
      setError("notHttps"); return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
      });
      streamRef.current = stream;
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        videoRef.current.play();
      }
      setActive(true);
      setError(null);

      const tick = () => {
        if (!videoRef.current || !canvasRef.current) return;
        const video  = videoRef.current;
        const canvas = canvasRef.current;
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.height = video.videoHeight;
          canvas.width  = video.videoWidth;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          if (window.jsQR) {
            const code = window.jsQR(imageData.data, imageData.width, imageData.height, {
              inversionAttempts: "dontInvert",
            });
            if (code) { onScan(code.data); return; }
          }
        }
        rafRef.current = requestAnimationFrame(tick);
      };
      rafRef.current = requestAnimationFrame(tick);
    } catch (e) {
      setError(detectCameraErrorType(e));
    }
  }, [onScan]);

  useEffect(() => () => stop(), [stop]);

  return { videoRef, canvasRef, start, stop, active, error, permState };
}

    const r2 = db.ref("prizes");
    const r3 = db.ref("eventName");

    r1.on("value", s => { const v = s.val(); if (v) setBooths(Array.isArray(v) ? v : Object.values(v)); });
    r2.on("value", s => { const v = s.val(); if (v) setPrizes(Array.isArray(v) ? v : Object.values(v)); });
    r3.on("value", s => { const v = s.val(); if (v) setEventName(v); });

    setTimeout(() => setLoading(false), 1000);
    return () => { r1.off(); r2.off(); r3.off(); };
  }, []);

  // ── 個人データはlocalStorageに保存 ──
  useEffect(() => { lsSet("sr_stamps",  stamps);   }, [stamps]);
  useEffect(() => { lsSet("sr_prize",   userPrize); }, [userPrize]);
  useEffect(() => { lsSet("sr_claimed", claimed);   }, [claimed]);

  const showToast = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2800);
  };

  const handleStamp = (boothId) => {
    if (stamps.includes(boothId)) {
      showToast("このスタンプはすでに押されています", "warn");
      return false;
    }
    const booth = booths.find(b => b.id === boothId);
    if (!booth) { showToast("無効なQRコードです", "error"); return false; }

    const newStamps = [...stamps, boothId];
    setStamps(newStamps);

    // Firebaseに来場者データを記録
    const db = window._db;
    if (db) {
      const now = Date.now();
      if (!lsGet("sr_startedAt")) lsSet("sr_startedAt", now);
      const data = {
        stamps: newStamps,
        startedAt: lsGet("sr_startedAt") || now,
      };
      if (newStamps.length === booths.length) data.completedAt = now;
      db.ref("visitors/" + userId).set(data);
    }

    showToast("「" + booth.name + "」のスタンプをゲット！", "success");
    setNewlyStamped(boothId);
    setPage("home");
    setTimeout(() => setNewlyStamped(null), 1200);
    if (newStamps.length === booths.length && !userPrize) {
      setTimeout(() => setPage("complete"), 1600);
    }
    return true;
  };

  const handleComplete = () => {
    if (userPrize) return;
    const available = prizes.filter(p => p.stock > 0);
    if (available.length === 0) { showToast("景品がなくなりました", "error"); return; }
    const prize = available[Math.floor(Math.random() * available.length)];

    const db = window._db;
    if (db) {
      // Firebaseで在庫をアトミックに減算
      db.ref("prizes").transaction(current => {
        if (!current) return current;
        const arr = Array.isArray(current) ? current : Object.values(current);
        const idx = arr.findIndex(p => p.id === prize.id);
        if (idx === -1 || arr[idx].stock <= 0) return;
        arr[idx] = { ...arr[idx], stock: arr[idx].stock - 1 };
        return arr;
      }).then(() => {
        setUserPrize(prize);
      }).catch(() => {
        setUserPrize(prize); // Firebase失敗時はローカルで設定
      });
    } else {
      setUserPrize(prize);
    }
  };

  const handleClaim = () => {
    if (claimed || !userPrize) return;
    setClaimed(true);
    const db = window._db;
    if (db) {
      db.ref("claims").push({ userId, prize: userPrize, claimedAt: Date.now() });
      db.ref("visitors/" + userId + "/claimed").set(true);
    }
  };

  // 管理者用: FirebaseとStateを同時更新
  const updateBooths = (v) => {
    setBooths(v);
    if (window._db) window._db.ref("booths").set(v);
  };
  const updatePrizes = (v) => {
    setPrizes(v);
    if (window._db) window._db.ref("prizes").set(v);
  };
  const updateEventName = (v) => {
    setEventName(v);
    if (window._db) window._db.ref("eventName").set(v);
  };

  const completed = stamps.length > 0 && stamps.length === booths.length;
  const progress  = booths.length > 0 ? stamps.length / booths.length : 0;

  if (loading) return (
    <div style={{ minHeight:"100dvh", display:"flex", flexDirection:"column", alignItems:"center",
      justifyContent:"center", background:"linear-gradient(160deg,#0f0c29,#302b63,#24243e)", gap:16 }}>
      <div style={{ fontSize:60 }}>🎪</div>
      <div style={{ color:"rgba(255,255,255,0.7)", fontSize:16, fontWeight:700 }}>読み込み中...</div>
      <div style={{ width:44, height:44, border:"4px solid rgba(255,255,255,0.1)",
        borderTop:"4px solid #667eea", borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
    </div>
  );

  return (
    <div style={styles.app}>
      {toast && (
        <div style={{ ...styles.toast,
          ...(toast.type==="warn" ? styles.toastWarn : toast.type==="error" ? styles.toastError : {}) }}>
          {toast.type==="success" ? "✓ " : toast.type==="warn" ? "⚠ " : "✗ "}{toast.msg}
        </div>
      )}
      {page === "home" && (
        <HomePage booths={booths} stamps={stamps} progress={progress} completed={completed}
          onScan={() => setPage("scan")} onComplete={() => setPage("complete")}
          onAdmin={() => setPage("admin")} userPrize={userPrize} claimed={claimed}
          newlyStamped={newlyStamped} eventName={eventName} />
      )}
      {page === "scan" && (
        <ScanPage booths={booths} stamps={stamps} onScan={handleStamp} onBack={() => setPage("home")} />
      )}
      {page === "complete" && (
        <CompletePage userPrize={userPrize} claimed={claimed}
          onGetPrize={handleComplete} onClaim={handleClaim} onBack={() => setPage("home")} />
      )}
      {page === "admin" && (
        <AdminPage booths={booths} setBooths={updateBooths}
          prizes={prizes} setPrizes={updatePrizes}
          eventName={eventName} setEventName={updateEventName}
          onBack={() => setPage("home")} onStaff={() => setPage("staff")} />
      )}
      {page === "staff" && (
        <StaffPage onBack={() => setPage("admin")} />
      )}
    </div>
  );
}

function MiniRing({ pct, got, total, completed }) {
  const r = 26, cx = 32, cy = 32;
  const circ   = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return (
    <div style={homeStyles.miniRingWrap}>
      <svg width="64" height="64">
        <defs>
          <linearGradient id="miniGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor={completed ? "#f093fb" : "#667eea"} />
            <stop offset="100%" stopColor={completed ? "#f5576c" : "#764ba2"} />
          </linearGradient>
        </defs>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="5" />
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="url(#miniGrad)" strokeWidth="5"
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{ transform:"rotate(-90deg)", transformOrigin:`${cx}px ${cy}px`, transition:"stroke-dashoffset 0.6s ease" }}
        />
      </svg>
      <div style={homeStyles.miniRingInner}>
        <span style={homeStyles.miniRingNum}>{got}</span>
        <span style={homeStyles.miniRingOf}>/{total}</span>
      </div>
    </div>
  );
}

function ProgressRing({ pct, stamps, total, completed }) {
  const r = 70, cx = 90, cy = 90;
  const circumference = 2 * Math.PI * r;
  const offset = circumference - (pct / 100) * circumference;

  return (
    <div style={styles.ringWrapper}>
      <svg width="180" height="180" style={{ overflow: "visible" }}>
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor={completed ? "#f093fb" : "#667eea"} />
            <stop offset="100%" stopColor={completed ? "#f5576c" : "#764ba2"} />

        </defs>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="10" />
        <circle
          cx={cx} cy={cy} r={r} fill="none"
          stroke="url(#ringGrad)" strokeWidth="10"
          strokeDasharray={circumference} strokeDashoffset={offset}
          strokeLinecap="round"
          style={{ transform: "rotate(-90deg)", transformOrigin: `${cx}px ${cy}px`, transition: "stroke-dashoffset 0.6s ease" }}
        />

// ==================== SCAN PAGE ====================
function ScanPage({ booths, stamps, onScan, onBack }) {
  const [manualId, setManualId] = useState("");
  const scanned = useRef(false);

  const handleScan = useCallback((data) => {
    if (scanned.current) return;
    const match = data.match(/^STAMP_RALLY:(.+)$/);
    if (!match) return;
    scanned.current = true;
    onScan(match[1]);
    setTimeout(() => { scanned.current = false; }, 2000);
  }, [onScan]);

  const { videoRef, canvasRef, start, stop, active, error } = useQRScanner(handleScan);

  useEffect(() => { start(); return () => stop(); }, []);

  const handleManual = () => {
    if (manualId.trim()) { onScan(manualId.trim()); setManualId(""); }
  };
  const handleRetry = () => { stop(); setTimeout(() => start(), 300); };

  return (
    <div style={styles.page}>
      <div style={styles.pageHeader}>
        <button style={styles.backBtn} onClick={() => { stop(); onBack(); }}>← 戻る</button>
        <h2 style={styles.pageTitle}>QRスキャン</h2>
        <div />
      </div>

      {error ? (
        /* カメラ許可ガイド */
        <div style={{ flex: 1, overflowY: "auto", paddingBottom: 24 }}>
          <CameraPermissionGuide errorType={error} onRetry={handleRetry} />
          <div style={{ ...styles.manualSection, marginTop: 20 }}>
            <p style={{ color: "rgba(255,255,255,0.35)", fontSize: 11, textAlign: "center", marginBottom: 8 }}>
              ─ カメラが使えない場合は手動入力 ─
            </p>
            <div style={styles.manualRow}>
              <select value={manualId} onChange={e => setManualId(e.target.value)} style={styles.manualSelect}>
                <option value="">ブースを選択...</option>
                {booths.map(b => (
                  <option key={b.id} value={b.id} disabled={stamps.includes(b.id)}>
                    {b.icon} {b.name}{stamps.includes(b.id) ? " ✓" : ""}
                  </option>
                ))}
              </select>
              <button style={styles.manualBtn} onClick={handleManual}>取得</button>
            </div>
          </div>
        </div>
      ) : (
        /* 通常スキャン画面 */
        <>
          <div style={styles.scanArea}>
            <video ref={videoRef} style={styles.video} playsInline muted />
            <canvas ref={canvasRef} style={{ display: "none" }} />
            <div style={styles.scanFrame}>
              <div style={{ ...styles.scanCorner, top: 0, left: 0, borderTopWidth: 3, borderLeftWidth: 3 }} />
              <div style={{ ...styles.scanCorner, top: 0, right: 0, borderTopWidth: 3, borderRightWidth: 3 }} />
              <div style={{ ...styles.scanCorner, bottom: 0, left: 0, borderBottomWidth: 3, borderLeftWidth: 3 }} />
              <div style={{ ...styles.scanCorner, bottom: 0, right: 0, borderBottomWidth: 3, borderRightWidth: 3 }} />
              <div style={styles.scanLine} />
            </div>
          </div>
          <p style={styles.scanHint}>ブースのQRコードをカメラに向けてください</p>
          <div style={styles.manualSection}>
            <p style={{ color: "rgba(255,255,255,0.4)", fontSize: 11, textAlign: "center", marginBottom: 8 }}>
              ─ テスト用手動入力 ─
            </p>
            <div style={styles.manualRow}>
              <select value={manualId} onChange={e => setManualId(e.target.value)} style={styles.manualSelect}>
                <option value="">ブースを選択...</option>
                {booths.map(b => (
                  <option key={b.id} value={b.id} disabled={stamps.includes(b.id)}>
                    {b.icon} {b.name}{stamps.includes(b.id) ? " ✓" : ""}
                  </option>
                ))}
              </select>
              <button style={styles.manualBtn} onClick={handleManual}>取得</button>

// ==================== QR DISPLAY ====================
function QRDisplay({ boothId }) {
  const [show, setShow] = useState(false);
  const canvasRef = useRef(null);

  useEffect(() => {
    if (!show || !canvasRef.current) return;
    const text = `STAMP_RALLY:${boothId}`;
    // Simple QR-like visualization using qrcode.js via CDN
    if (!window.QRCode) {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
      s.onload = () => renderQR(text);
      document.head.appendChild(s);
    } else {
      renderQR(text);
    }
    function renderQR(t) {
      canvasRef.current.innerHTML = "";
      new window.QRCode(canvasRef.current, { text: t, width: 128, height: 128, colorDark: "#000", colorLight: "#fff" });
    }
  }, [show, boothId]);

  return (
    <div>
      <button style={{ ...styles.btnEdit, marginTop: 4, fontSize: 11 }} onClick={() => setShow(!show)}>
        {show ? "QR非表示" : "QR表示"}
      </button>
      {show && (
        <div style={{ marginTop: 8, background: "#fff", padding: 8, borderRadius: 8, display: "inline-block" }}>
          <div ref={canvasRef} />
          <div style={{ fontSize: 10, color: "#333", textAlign: "center", marginTop: 4 }}>
            STAMP_RALLY:{boothId}
          </div>
        </div>
      )}
    </div>
  );
}

// ==================== STAFF PAGE (Firebase) ====================
function StaffPage({ onBack }) {
  const [claims, setClaims] = useState([]);
  useEffect(() => {
    const db = window._db;
    if (!db) return;
    const r = db.ref("claims");
    r.on("value", s => {
      const val = s.val();
      setClaims(val ? Object.values(val).sort((a,b)=>b.claimedAt-a.claimedAt) : []);
    });
    return () => r.off();
  }, []);
  return (
    <div style={styles.page}>
      <div style={styles.pageHeader}>
        <button style={styles.backBtn} onClick={onBack}>← 戻る</button>
        <h2 style={styles.pageTitle}>スタッフ確認</h2>
        <div />
      </div>
      <div style={styles.tabContent}>
        <h3 style={styles.sectionTitle}>景品受取記録 ({claims.length}件)</h3>
        {claims.length === 0 ? (
          <p style={{ color:"rgba(255,255,255,0.3)", textAlign:"center", marginTop:30 }}>まだ景品受取なし</p>

  );
}

 // ── 来場者タブ (Firebase版) ──
function VisitorsTab({ booths }) {
  const [list, setList]           = useState([]);
  const [claims, setClaims]       = useState([]);
  const [confirmAll, setConfirmAll] = useState(false);

  useEffect(() => {
    const db = window._db;
    if (!db) return;
    const r1 = db.ref("visitors");
    const r2 = db.ref("claims");
    r1.on("value", s => setList(s.val() ? Object.entries(s.val()) : []));
    r2.on("value", s => setClaims(s.val() ? Object.values(s.val()) : []));
    return () => { r1.off(); r2.off(); };
  }, []);

  const deleteOne = (uid) => { if(window._db) window._db.ref("visitors/"+uid).remove(); };
  const deleteAll = () => {
    if(window._db){ window._db.ref("visitors").remove(); window._db.ref("claims").remove(); }
    setConfirmAll(false);
  };

  const completedList = list.filter(([,v])=>v.stamps?.length===booths.length);

  return (
    <div style={styles.tabContent}>
      <div style={styles.statsRow}>
        <div style={styles.statBox}><div style={styles.statNum}>{list.length}</div><div style={styles.statLabel}>参加者数</div></div>
        <div style={styles.statBox}><div style={styles.statNum}>{completedList.length}</div><div style={styles.statLabel}>コンプリート</div></div>
        <div style={styles.statBox}><div style={styles.statNum}>{claims.length}</div><div style={styles.statLabel}>景品受取済</div></div>
      </div>
      {list.length > 0 && (
        <div style={{ marginBottom:12 }}>
          {!confirmAll ? (
            <button style={visitorStyles.btnDeleteAll} onClick={()=>setConfirmAll(true)}>
              🗑️　来場者データをすべて削除
            </button>
          ) : (
            <div style={visitorStyles.confirmAllBox}>
              <p style={visitorStyles.confirmAllText}>
                ⚠️ 全来場者データと景品受取記録を削除します。この操作は取り消せません。
              </p>
              <div style={{ display:"flex", gap:8 }}>
                <button style={visitorStyles.btnDeleteConfirm} onClick={deleteAll}>削除する</button>
                <button style={visitorStyles.btnDeleteCancel} onClick={()=>setConfirmAll(false)}>キャンセル</button>
              </div>
            </div>
          )}
        </div>
      )}
      {list.length === 0 ? (
        <p style={{ color:"rgba(255,255,255,0.3)", textAlign:"center", marginTop:40 }}>来場者データなし</p>
      ) : list.map(([uid,v]) => {
        const isComplete = v.stamps?.length === booths.length;
        const fmt = (ts) => ts ? new Date(ts).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}) : null;
        return (
          <div key={uid} style={styles.adminCard}>
            <div style={styles.adminRow}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", gap:6, marginBottom:6, flexWrap:"wrap" }}>
                  {isComplete && <span style={visitorStyles.badgeComplete}>🎉 完了</span>}
                  {v.claimed  && <span style={visitorStyles.badgeClaimed}>🎁 受取済</span>}
                  {!isComplete && <span style={visitorStyles.badgeProgress}>{v.stamps?.length||0}/{booths.length} 箇所</span>}
                </div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:3, marginBottom:6 }}>
                  {booths.map(b=>(
                    <span key={b.id} style={{ fontSize:16, opacity:(v.stamps||[]).includes(b.id)?1:0.15 }}>{b.icon}</span>
                  ))}
                </div>
                <div style={visitorStyles.timeRow}>
                  {fmt(v.startedAt)   && <span>🕐 開始 {fmt(v.startedAt)}</span>}
                  {fmt(v.completedAt) && <span>✅ 完了 {fmt(v.completedAt)}</span>}
                </div>
                <div style={{ color:"rgba(255,255,255,0.2)", fontSize:10, marginTop:4 }}>{uid}</div>
              </div>
              <button style={visitorStyles.btnDeleteOne}
                onClick={()=>{ if(window.confirm("この来場者データを削除しますか？")) deleteOne(uid); }}>🗑</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function detectCameraErrorType(e) {
  const name = e?.name || "";
  const msg  = (e?.message || "").toLowerCase();
  if (name === "NotAllowedError"  || msg.includes("permission") || msg.includes("denied"))
    return "denied";
  if (name === "NotFoundError"    || msg.includes("not found") || msg.includes("no device"))
    return "notFound";
  if (name === "NotSupportedError"|| msg.includes("secure")    || msg.includes("https"))
    return "notHttps";
  if (name === "NotReadableError" || msg.includes("in use")    || msg.includes("allocated"))
    return "inUse";
  return "unknown";
}

function useQRScanner(onScan) {
  const videoRef  = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef    = useRef(null);
  const [error,     setError]     = useState(null);   // null | errorType string
  const [active,    setActive]    = useState(false);
  const [permState, setPermState] = useState(null);   // "granted"|"denied"|"prompt"|null

  // 許可状態をポーリングで監視（設定変更後に自動リトライ）
  useEffect(() => {
    if (!navigator.permissions) return;
    let timer;
    navigator.permissions.query({ name: "camera" }).then(status => {
      setPermState(status.state);
      status.onchange = () => {
        setPermState(status.state);
        if (status.state === "granted") { setError(null); }
      };
    }).catch(() => {});
    return () => clearTimeout(timer);
  }, []);

  const stop = useCallback(() => {
    cancelAnimationFrame(rafRef.current);
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
    setActive(false);
  }, []);

  const start = useCallback(async () => {
    setError(null);
    if (!navigator.mediaDevices?.getUserMedia) {
      setError("notHttps"); return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
      });
      streamRef.current = stream;
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        videoRef.current.play();
      }
      setActive(true);
      setError(null);

      const tick = () => {
        if (!videoRef.current || !canvasRef.current) return;
        const video  = videoRef.current;
        const canvas = canvasRef.current;
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.height = video.videoHeight;
          canvas.width  = video.videoWidth;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          if (window.jsQR) {
            const code = window.jsQR(imageData.data, imageData.width, imageData.height, {
              inversionAttempts: "dontInvert",
            });
            if (code) { onScan(code.data); return; }
          }
        }
        rafRef.current = requestAnimationFrame(tick);
      };
      rafRef.current = requestAnimationFrame(tick);
    } catch (e) {
      setError(detectCameraErrorType(e));
    }
  }, [onScan]);

  useEffect(() => () => stop(), [stop]);

  return { videoRef, canvasRef, start, stop, active, error, permState };
}

function StampRallyApp() {
  const [page,         setPage]        = useState("home");
  const [booths,       setBooths]      = useState(DEFAULT_BOOTHS);
  const [prizes,       setPrizes]      = useState(DEFAULT_PRIZES);
  const [eventName,    setEventName]   = useState("学園祭2024");
  const [stamps,       setStamps]      = useState(() => lsGet("sr_stamps", []));
  const [userPrize,    setUserPrize]   = useState(() => lsGet("sr_prize",  null));
  const [claimed,      setClaimed]     = useState(() => lsGet("sr_claimed", false));
  const [toast,        setToast]       = useState(null);
  const [newlyStamped, setNewlyStamped]= useState(null);
  const [loading,      setLoading]     = useState(true);
  const userId = useRef(getUserId()).current;

  // ── Firebase購読（共有データ）──
  useEffect(() => {
    const db = window._db;
    if (!db) { setLoading(false); return; }

    // 初期データ未設定なら書き込む
    db.ref("booths").once("value").then(s => {
      if (!s.val()) db.ref("booths").set(DEFAULT_BOOTHS);
    });
    db.ref("prizes").once("value").then(s => {
      if (!s.val()) db.ref("prizes").set(DEFAULT_PRIZES);
    });
    db.ref("eventName").once("value").then(s => {
      if (!s.val()) db.ref("eventName").set("学園祭2024");
    });

    // リアルタイム購読
    const r1 = db.ref("booths");
    const r2 = db.ref("prizes");
    const r3 = db.ref("eventName");

    r1.on("value", s => { const v = s.val(); if (v) setBooths(Array.isArray(v) ? v : Object.values(v)); });
    r2.on("value", s => { const v = s.val(); if (v) setPrizes(Array.isArray(v) ? v : Object.values(v)); });
    r3.on("value", s => { const v = s.val(); if (v) setEventName(v); });

    setTimeout(() => setLoading(false), 1000);
    return () => { r1.off(); r2.off(); r3.off(); };
  }, []);

  // ── 個人データはlocalStorageに保存 ──
  useEffect(() => { lsSet("sr_stamps",  stamps);   }, [stamps]);
  useEffect(() => { lsSet("sr_prize",   userPrize); }, [userPrize]);
  useEffect(() => { lsSet("sr_claimed", claimed);   }, [claimed]);

  const showToast = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2800);
  };

  const handleStamp = (boothId) => {
    if (stamps.includes(boothId)) {
      showToast("このスタンプはすでに押されています", "warn");
      return false;
    }
    const booth = booths.find(b => b.id === boothId);
    if (!booth) { showToast("無効なQRコードです", "error"); return false; }

    const newStamps = [...stamps, boothId];
    setStamps(newStamps);

    // Firebaseに来場者データを記録
    const db = window._db;
    if (db) {
      const now = Date.now();
      if (!lsGet("sr_startedAt")) lsSet("sr_startedAt", now);
      const data = {
        stamps: newStamps,
        startedAt: lsGet("sr_startedAt") || now,
      };
      if (newStamps.length === booths.length) data.completedAt = now;
      db.ref("visitors/" + userId).set(data);
    }

    showToast("「" + booth.name + "」のスタンプをゲット！", "success");
    setNewlyStamped(boothId);
    setPage("home");
    setTimeout(() => setNewlyStamped(null), 1200);
    if (newStamps.length === booths.length && !userPrize) {
      setTimeout(() => setPage("complete"), 1600);
    }
    return true;
  };

  const handleComplete = () => {
    if (userPrize) return;
    const available = prizes.filter(p => p.stock > 0);
    if (available.length === 0) { showToast("景品がなくなりました", "error"); return; }
    const prize = available[Math.floor(Math.random() * available.length)];

    const db = window._db;
    if (db) {
      // Firebaseで在庫をアトミックに減算
      db.ref("prizes").transaction(current => {
        if (!current) return current;
        const arr = Array.isArray(current) ? current : Object.values(current);
        const idx = arr.findIndex(p => p.id === prize.id);
        if (idx === -1 || arr[idx].stock <= 0) return;
        arr[idx] = { ...arr[idx], stock: arr[idx].stock - 1 };
        return arr;
      }).then(() => {
        setUserPrize(prize);
      }).catch(() => {
        setUserPrize(prize); // Firebase失敗時はローカルで設定
      });
    } else {
      setUserPrize(prize);
    }
  };

  const handleClaim = () => {
    if (claimed || !userPrize) return;
    setClaimed(true);
    const db = window._db;
    if (db) {
      db.ref("claims").push({ userId, prize: userPrize, claimedAt: Date.now() });
      db.ref("visitors/" + userId + "/claimed").set(true);
    }
  };

  // 管理者用: FirebaseとStateを同時更新
  const updateBooths = (v) => {
    setBooths(v);
    if (window._db) window._db.ref("booths").set(v);
  };
  const updatePrizes = (v) => {
    setPrizes(v);
    if (window._db) window._db.ref("prizes").set(v);
  };
  const updateEventName = (v) => {
    setEventName(v);
    if (window._db) window._db.ref("eventName").set(v);
  };

  const completed = stamps.length > 0 && stamps.length === booths.length;
  const progress  = booths.length > 0 ? stamps.length / booths.length : 0;

  if (loading) return (
    <div style={{ minHeight:"100dvh", display:"flex", flexDirection:"column", alignItems:"center",
      justifyContent:"center", background:"linear-gradient(160deg,#0f0c29,#302b63,#24243e)", gap:16 }}>
      <div style={{ fontSize:60 }}>🎪</div>
      <div style={{ color:"rgba(255,255,255,0.7)", fontSize:16, fontWeight:700 }}>読み込み中...</div>
      <div style={{ width:44, height:44, border:"4px solid rgba(255,255,255,0.1)",
        borderTop:"4px solid #667eea", borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
    </div>
  );

  return (
    <div style={styles.app}>
      {toast && (
        <div style={{ ...styles.toast,
          ...(toast.type==="warn" ? styles.toastWarn : toast.type==="error" ? styles.toastError : {}) }}>
          {toast.type==="success" ? "✓ " : toast.type==="warn" ? "⚠ " : "✗ "}{toast.msg}
        </div>
      )}
      {page === "home" && (
        <HomePage booths={booths} stamps={stamps} progress={progress} completed={completed}
          onScan={() => setPage("scan")} onComplete={() => setPage("complete")}
          onAdmin={() => setPage("admin")} userPrize={userPrize} claimed={claimed}
          newlyStamped={newlyStamped} eventName={eventName} />
      )}
      {page === "scan" && (
        <ScanPage booths={booths} stamps={stamps} onScan={handleStamp} onBack={() => setPage("home")} />
      )}

        <CompletePage userPrize={userPrize} claimed={claimed}

      )}
      {page === "admin" && (
        <AdminPage booths={booths} setBooths={updateBooths}
          prizes={prizes} setPrizes={updatePrizes}
          eventName={eventName} setEventName={updateEventName}
          onBack={() => setPage("home")} onStaff={() => setPage("staff")} />
      )}
      {page === "staff" && (
        <StaffPage onBack={() => setPage("admin")} />
      )}
    </div>
  );
}

function MiniRing({ pct, got, total, completed }) {
  const r = 26, cx = 32, cy = 32;
  const circ   = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return (
    <div style={homeStyles.miniRingWrap}>
      <svg width="64" height="64">
        <defs>
          <linearGradient id="miniGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor={completed ? "#f093fb" : "#667eea"} />
            <stop offset="100%" stopColor={completed ? "#f5576c" : "#764ba2"} />
          </linearGradient>
        </defs>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="5" />
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="url(#miniGrad)" strokeWidth="5"
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{ transform:"rotate(-90deg)", transformOrigin:`${cx}px ${cy}px`, transition:"stroke-dashoffset 0.6s ease" }}
        />
      </svg>
      <div style={homeStyles.miniRingInner}>
        <span style={homeStyles.miniRingNum}>{got}</span>
        <span style={homeStyles.miniRingOf}>/{total}</span>
      </div>
    </div>
  );
}

// ==================== PROGRESS RING ====================
function ProgressRing({ pct, stamps, total, completed }) {
  const r = 70, cx = 90, cy = 90;
  const circumference = 2 * Math.PI * r;
  const offset = circumference - (pct / 100) * circumference;

  return (
    <div style={styles.ringWrapper}>
      <svg width="180" height="180" style={{ overflow: "visible" }}>
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor={completed ? "#f093fb" : "#667eea"} />
            <stop offset="100%" stopColor={completed ? "#f5576c" : "#764ba2"} />
          </linearGradient>
        </defs>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="10" />
        <circle
          cx={cx} cy={cy} r={r} fill="none"
          stroke="url(#ringGrad)" strokeWidth="10"
          strokeDasharray={circumference} strokeDashoffset={offset}
          strokeLinecap="round"
          style={{ transform: "rotate(-90deg)", transformOrigin: `${cx}px ${cy}px`, transition: "stroke-dashoffset 0.6s ease" }}
        />
      </svg>
      <div style={styles.ringInner}>
        <div style={styles.ringNum}>{stamps}</div>
        <div style={styles.ringOf}>/ {total}</div>
        <div style={styles.ringLabel}>{completed ? "完了！" : "スタンプ"}</div>
      </div>
    </div>
  );
}

// ==================== SCAN PAGE ====================
function ScanPage({ booths, stamps, onScan, onBack }) {
  const [manualId, setManualId] = useState("");
  const scanned = useRef(false);

  const handleScan = useCallback((data) => {
    if (scanned.current) return;
    const match = data.match(/^STAMP_RALLY:(.+)$/);
    if (!match) return;
    scanned.current = true;
    onScan(match[1]);
    setTimeout(() => { scanned.current = false; }, 2000);
  }, [onScan]);

  const { videoRef, canvasRef, start, stop, active, error } = useQRScanner(handleScan);

  useEffect(() => { start(); return () => stop(); }, []);

  const handleManual = () => {
    if (manualId.trim()) { onScan(manualId.trim()); setManualId(""); }
  };
  const handleRetry = () => { stop(); setTimeout(() => start(), 300); };

  return (
    <div style={styles.page}>
      <div style={styles.pageHeader}>
        <button style={styles.backBtn} onClick={() => { stop(); onBack(); }}>← 戻る</button>
        <h2 style={styles.pageTitle}>QRスキャン</h2>
        <div />
      </div>

      {error ? (
        /* カメラ許可ガイド */
        <div style={{ flex: 1, overflowY: "auto", paddingBottom: 24 }}>
          <CameraPermissionGuide errorType={error} onRetry={handleRetry} />
          <div style={{ ...styles.manualSection, marginTop: 20 }}>
            <p style={{ color: "rgba(255,255,255,0.35)", fontSize: 11, textAlign: "center", marginBottom: 8 }}>
              ─ カメラが使えない場合は手動入力 ─
            </p>
            <div style={styles.manualRow}>
              <select value={manualId} onChange={e => setManualId(e.target.value)} style={styles.manualSelect}>
                <option value="">ブースを選択...</option>
                {booths.map(b => (
                  <option key={b.id} value={b.id} disabled={stamps.includes(b.id)}>
                    {b.icon} {b.name}{stamps.includes(b.id) ? " ✓" : ""}
                  </option>
                ))}
              </select>
              <button style={styles.manualBtn} onClick={handleManual}>取得</button>
            </div>
          </div>
        </div>
      ) : (
        /* 通常スキャン画面 */
        <>
          <div style={styles.scanArea}>
            <video ref={videoRef} style={styles.video} playsInline muted />
            <canvas ref={canvasRef} style={{ display: "none" }} />
            <div style={styles.scanFrame}>
              <div style={{ ...styles.scanCorner, top: 0, left: 0, borderTopWidth: 3, borderLeftWidth: 3 }} />
              <div style={{ ...styles.scanCorner, top: 0, right: 0, borderTopWidth: 3, borderRightWidth: 3 }} />
              <div style={{ ...styles.scanCorner, bottom: 0, left: 0, borderBottomWidth: 3, borderLeftWidth: 3 }} />
              <div style={{ ...styles.scanCorner, bottom: 0, right: 0, borderBottomWidth: 3, borderRightWidth: 3 }} />
              <div style={styles.scanLine} />
            </div>
          </div>
          <p style={styles.scanHint}>ブースのQRコードをカメラに向けてください</p>
          <div style={styles.manualSection}>
            <p style={{ color: "rgba(255,255,255,0.4)", fontSize: 11, textAlign: "center", marginBottom: 8 }}>
              ─ テスト用手動入力 ─
            </p>
            <div style={styles.manualRow}>
              <select value={manualId} onChange={e => setManualId(e.target.value)} style={styles.manualSelect}>
                <option value="">ブースを選択...</option>
                {booths.map(b => (
                  <option key={b.id} value={b.id} disabled={stamps.includes(b.id)}>
                    {b.icon} {b.name}{stamps.includes(b.id) ? " ✓" : ""}
                  </option>
                ))}
              </select>
              <button style={styles.manualBtn} onClick={handleManual}>取得</button>
            </div>
          </div>
        </>
      )}

  );
}

function CompletePage({ userPrize, claimed, onGetPrize, onClaim, onBack }) {
  const [revealed, setRevealed] = useState(!!userPrize);
  const [confirming, setConfirming] = useState(false);

  const handleReveal = () => {
    onGetPrize();
    setRevealed(true);
  };

  return (
    <div style={styles.page}>
      <div style={styles.confettiArea}>
        {[...Array(20)].map((_, i) => (
          <div key={i} style={{ ...styles.confettiPiece, left: `${Math.random() * 100}%`, animationDelay: `${Math.random() * 2}s`, background: ["#f093fb","#f5576c","#ffd200","#00c9a7","#667eea"][i % 5] }} />
        ))}
      </div>

      <div style={styles.completePage}>
        <div style={{ fontSize: 60, marginBottom: 8 }}>🎊</div>
        <h2 style={styles.completeTitle}>コンプリート！</h2>
        <p style={styles.completeSubtitle}>全ブースを制覇しました！</p>

        {!revealed ? (
          <button style={styles.btnGold} onClick={handleReveal}>
            🎁 景品を確認する
          </button>
        ) : claimed ? (
          <div style={styles.claimedBox}>
            <div style={{ fontSize: 50 }}>{userPrize?.icon}</div>
            <div style={styles.prizeName}>{userPrize?.name}</div>
            <div style={styles.claimedLabel}>受け取り済み ✓</div>
            <p style={{ color: "rgba(255,255,255,0.5)", fontSize: 13, marginTop: 16 }}>
              ご参加ありがとうございました！
            </p>
            <button style={styles.btnSecondary} onClick={onBack}>ホームに戻る</button>
          </div>
        ) : (
          <div style={styles.prizeBox}>
            <div style={{ fontSize: 56 }}>{userPrize?.icon}</div>
            <div style={styles.prizeName}>{userPrize?.name}</div>
            <p style={styles.prizeNote}>スタッフに画面を見せて景品を受け取ってください</p>

            {!confirming ? (
              <button style={styles.btnGold} onClick={() => setConfirming(true)}>
                景品を受け取る
              </button>
            ) : (
              <div style={styles.confirmBox}>
                <p style={{ color: "#fff", marginBottom: 12, fontWeight: 600 }}>
                  景品を受け取りましたか？<br />
                  <span style={{ fontSize: 12, fontWeight: 400, color: "rgba(255,255,255,0.6)" }}>
                    ※ この操作は取り消せません
                  </span>
                </p>
                <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
                  <button style={styles.btnConfirmYes} onClick={onClaim}>はい、受け取りました</button>
                  <button style={styles.btnConfirmNo} onClick={() => setConfirming(false)}>いいえ</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ==================== QR DISPLAY ====================
function QRDisplay({ boothId }) {
  const [show, setShow] = useState(false);
  const canvasRef = useRef(null);

  useEffect(() => {
    if (!show || !canvasRef.current) return;
    const text = `STAMP_RALLY:${boothId}`;
    // Simple QR-like visualization using qrcode.js via CDN
    if (!window.QRCode) {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
      s.onload = () => renderQR(text);
      document.head.appendChild(s);
    } else {
      renderQR(text);
    }
    function renderQR(t) {
      canvasRef.current.innerHTML = "";
      new window.QRCode(canvasRef.current, { text: t, width: 128, height: 128, colorDark: "#000", colorLight: "#fff" });
    }
  }, [show, boothId]);

  return (
    <div>
      <button style={{ ...styles.btnEdit, marginTop: 4, fontSize: 11 }} onClick={() => setShow(!show)}>
        {show ? "QR非表示" : "QR表示"}
      </button>
      {show && (
        <div style={{ marginTop: 8, background: "#fff", padding: 8, borderRadius: 8, display: "inline-block" }}>
          <div ref={canvasRef} />
          <div style={{ fontSize: 10, color: "#333", textAlign: "center", marginTop: 4 }}>
            STAMP_RALLY:{boothId}
          </div>
        </div>
      )}
    </div>
  );
}

// ==================== STAFF PAGE (Firebase) ====================
function StaffPage({ onBack }) {
  const [claims, setClaims] = useState([]);
  useEffect(() => {
    const db = window._db;
    if (!db) return;
    const r = db.ref("claims");
    r.on("value", s => {
      const val = s.val();
      setClaims(val ? Object.values(val).sort((a,b)=>b.claimedAt-a.claimedAt) : []);
    });
    return () => r.off();
  }, []);
  return (
    <div style={styles.page}>
      <div style={styles.pageHeader}>
        <button style={styles.backBtn} onClick={onBack}>← 戻る</button>
        <h2 style={styles.pageTitle}>スタッフ確認</h2>
        <div />
      </div>
      <div style={styles.tabContent}>
        <h3 style={styles.sectionTitle}>景品受取記録 ({claims.length}件)</h3>
        {claims.length === 0 ? (
          <p style={{ color:"rgba(255,255,255,0.3)", textAlign:"center", marginTop:30 }}>まだ景品受取なし</p>
        ) : claims.map((c,i) => (
          <div key={i} style={styles.adminCard}>
            <div style={styles.adminRow}>
              <span style={{ fontSize:28 }}>{c.prize?.icon}</span>
              <div style={{ flex:1 }}>
                <div style={{ color:"#fff", fontWeight:600 }}>{c.prize?.name}</div>
                <div style={{ color:"rgba(255,255,255,0.4)", fontSize:12 }}>
                  {new Date(c.claimedAt).toLocaleString("ja-JP")}
                </div>
              </div>
              <span style={{ ...styles.stampChip, background:"#4ade80", color:"#000" }}>✓ 受取済</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ==================== GLOBAL STYLES ====================
const globalCSS = `
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap');
  * { box-sizing: border-box; }
  body { margin: 0; background: #0f0c29; }
  option { background: #302b63; color: #fff; }
  @keyframes scanLine {
    0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; }
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes stampBounce {
    0%   { transform: scale(0.3) rotate(-15deg); opacity: 0; }
    40%  { transform: scale(1.18) rotate(4deg);  opacity: 1; }
    65%  { transform: scale(0.92) rotate(-2deg); }
    80%  { transform: scale(1.05) rotate(1deg);  }
    100% { transform: scale(1)    rotate(0deg);  opacity: 1; }
  }
  @keyframes inkSpread {
    0%   { transform: scale(0.2); opacity: 0.8; }
    60%  { transform: scale(1.1); opacity: 0.5; }
    100% { transform: scale(1);   opacity: 0.6; }
  }
`;

const styleEl = document.createElement("style");
styleEl.textContent = globalCSS;
document.head.appendChild(styleEl);
